<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UniMateLK - User</title>

    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbarMount"></div>

<main class="page">
    <section class="container">
        <h1 id="title" class="page-title">User</h1>
        <div id="msg" class="toast"></div>

        <div id="profileCard" class="card"></div>

        <div id="actions" class="card" style="margin-top:12px;">
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn primary" id="matchBtn" type="button">Send Match Request</button>
                <button class="btn secondary" id="blockBtn" type="button">Block</button>
            </div>

            <div style="margin-top:14px;">
                <label for="reportReason">Report reason</label>
                <input id="reportReason" type="text" placeholder="Reason (required)" />

                <label for="reportDetails" style="display:block; margin-top:10px;">Report details</label>
                <textarea id="reportDetails" rows="4" placeholder="More details (optional)"></textarea>

                <button class="btn danger" id="reportBtn" type="button" style="margin-top:10px;">Report</button>
                <div id="reportMsg" style="margin-top:8px;"></div>
            </div>
        </div>

        <div id="matchCard" class="card" style="margin-top:12px; display:none;"></div>
    </section>
</main>

<script type="module">
    import { mountNavbar } from "/js/navbar.js";
    mountNavbar();
</script>

<script type="module" src="/js/user.js"></script>

</body>
</html>
