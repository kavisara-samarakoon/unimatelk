<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UniMateLK - Chat</title>

    <link rel="stylesheet" href="/css/theme.css"/>
    <link rel="stylesheet" href="/css/chat.css"/>
</head>

<body>

<div id="navbarMount"></div>

<main class="page">
    <section class="container">
        <h1 class="page-title">Chat</h1>
        <div id="msg" class="toast info"></div>

        <div class="chat-shell">
            <aside class="chat-sidebar">
                <h3>Rooms</h3>
                <div id="roomsList"></div>
            </aside>

            <section class="chat-main">
                <div id="roomTitle" class="room-title">Select a chat</div>

                <div id="chatBox" class="messages"></div>

                <div class="chat-input">
                    <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off"/>
                    <input id="imageInput" type="file" accept="image/*"/>
                    <button id="sendBtn" type="button">Send</button>
                    <button id="sendImageBtn" type="button">Send Image</button>
                </div>
            </section>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script type="module">
    import { mountNavbar } from "/js/navbar.js";
    mountNavbar();
</script>

<script type="module" src="/js/chat.js"></script>

</body>
</html>
