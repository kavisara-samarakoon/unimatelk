<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniMateLK - Friends</title>

  <link rel="stylesheet" href="/css/theme.css"/>
  <link rel="stylesheet" href="/css/liquid.css"/>
  <link rel="stylesheet" href="/css/friends.css"/>
</head>

<body class="liquid friends-page">

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="grain"></div>
</div>

<main class="page">
  <div id="navbarMount"></div>

  <section class="container friends-container">
    <div class="glass-shell friends-shell">

      <div class="friends-hero">
        <div>
          <h1 class="friends-title">Friends</h1>
          <p class="friends-sub">
            Manage your friends, open chat, block, or report when needed.
          </p>
        </div>

        <span class="badge friends-badge">Connections</span>
      </div>

      <div id="msg" class="toast info">Loading friends...</div>

      <div class="glass-card friends-card">
        <div class="friends-panel-head">
          <div>
            <h3 class="friends-panel-title">Your Friends</h3>
            <p class="friends-panel-subtitle">Accepted connections available for chat and actions.</p>
          </div>
          <span class="badge">Connected</span>
        </div>

        <div id="friendsList" class="friends-list"></div>
      </div>

    </div>
  </section>
</main>

<!-- Bottom Sheet -->
<div id="sheetBackdrop" aria-hidden="true">
  <div id="sheet" role="dialog" aria-modal="true">
    <div id="sheetHeader">
      <div>
        <div id="sheetTitle"></div>
        <div id="sheetSub"></div>
      </div>
      <button class="btn secondary" id="sheetCloseBtn" type="button">Close</button>
    </div>

    <div id="sheetActions">
      <a class="btn" id="openChatBtn" href="#">Open Chat</a>
      <a class="btn secondary" id="viewUserBtn" href="#">View User</a>
      <button class="btn secondary" id="blockBtn" type="button">Block</button>
      <button class="btn danger" id="openReportBtn" type="button">Report</button>
    </div>

    <div id="reportArea">
      <label for="reportReason" class="report-label">Report reason</label>
      <textarea id="reportReason" rows="4" placeholder="Explain what happened..."></textarea>

      <div class="report-actions">
        <button class="btn danger" id="submitReportBtn" type="button">Submit Report</button>
        <button class="btn secondary" id="cancelReportBtn" type="button">Cancel</button>
      </div>

      <div id="reportMsg" class="report-msg"></div>
    </div>
  </div>
</div>

<script type="module">
  import { mountNavbar } from "/js/navbar.js";
  mountNavbar();
</script>

<script type="module" src="/js/friends.js"></script>

</body>
</html>
