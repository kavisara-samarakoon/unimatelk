<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniMateLK - Friends</title>

  <link rel="stylesheet" href="/css/theme.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    #sheetBackdrop{
      position:fixed; inset:0; background:rgba(0,0,0,0.45);
      display:none; align-items:flex-end; justify-content:center;
      padding:16px; z-index:9999;
    }
    #sheet{
      width:min(680px, 100%);
      background:rgba(20,20,20,0.92);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:16px;
      padding:14px;
    }
    #sheetHeader{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:10px;
    }
    #sheetTitle{ font-weight:700; font-size:18px; }
    #sheetActions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    #reportArea{ display:none; margin-top:12px; }
    #reportReason{ width:100%; }
  </style>
</head>
<body>

<div id="navbarMount"></div>

<main class="page">
  <section class="container">
    <h1 class="page-title">Friends</h1>
    <div id="msg" class="toast"></div>

    <div class="card">
      <div id="friendsList"></div>
    </div>
  </section>
</main>

<div id="sheetBackdrop">
  <div id="sheet">
    <div id="sheetHeader">
      <div>
        <div id="sheetTitle"></div>
        <div id="sheetSub" style="opacity:0.85; margin-top:4px;"></div>
      </div>
      <button class="btn secondary" id="sheetCloseBtn" type="button">Close</button>
    </div>

    <div id="sheetActions">
      <a class="btn primary" id="openChatBtn" href="#">Open Chat</a>
      <a class="btn secondary" id="viewUserBtn" href="#">View User</a>
      <button class="btn secondary" id="blockBtn" type="button">Block</button>
      <button class="btn danger" id="openReportBtn" type="button">Report</button>
    </div>

    <div id="reportArea">
      <label style="display:block; margin-top:10px;">Report reason</label>
      <textarea id="reportReason" rows="4" placeholder="Explain what happened..."></textarea>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn danger" id="submitReportBtn" type="button">Submit Report</button>
        <button class="btn secondary" id="cancelReportBtn" type="button">Cancel</button>
      </div>
      <div id="reportMsg" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script type="module">
  import { mountNavbar } from "/js/navbar.js";
  mountNavbar();
</script>

<script type="module" src="/js/friends.js"></script>

</body>
</html>
