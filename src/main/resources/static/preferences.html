<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UniMateLK - Preferences</title>

    <link rel="stylesheet" href="/css/theme.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div id="navbarMount"></div>

<main class="page">
    <section class="container">
        <h1 class="page-title">Preferences</h1>
        <div id="msg" class="toast"></div>

        <div class="card">
            <label>Sleep Schedule (1–5)</label>
            <input id="sleepSchedule" type="number" min="1" max="5">

            <label style="margin-top:10px;">Cleanliness (1–5)</label>
            <input id="cleanliness" type="number" min="1" max="5">

            <label style="margin-top:10px;">Noise Tolerance (1–5)</label>
            <input id="noiseTolerance" type="number" min="1" max="5">

            <label style="margin-top:10px;">Guests (1–5)</label>
            <input id="guests" type="number" min="1" max="5">

            <label style="margin-top:10px;">Smoking OK</label>
            <select id="smokingOk">
                <option value="">Not set</option>
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>

            <label style="margin-top:10px;">Drinking OK</label>
            <select id="drinkingOk">
                <option value="">Not set</option>
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>

            <label style="margin-top:10px;">Introvert (1–5)</label>
            <input id="introvert" type="number" min="1" max="5">

            <button id="saveBtn" class="btn primary" type="button" style="margin-top:14px;">Save</button>
        </div>
    </section>
</main>

<script type="module">
    import { mountNavbar } from "/js/navbar.js";
    mountNavbar();
</script>

<script type="module" src="/js/preferences.js"></script>

</body>
</html>
